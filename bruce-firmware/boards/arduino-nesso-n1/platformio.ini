; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:arduino-nesso-n1]
board = arduino-nesso-n1
board_build.partitions = custom_16Mb.csv
build_src_filter =${env.build_src_filter} +<../boards/arduino-nesso-n1>
build_flags =
	${env.build_flags}
	-Iboards/arduino-nesso-n1
	-D DEVICE_NAME='"M5DinMeter"'
	-D HAS_TOUCH=1
	-D HAS_3_BUTTONS=1

	-D BTN_ALIAS='"SEL"'
	-D LED=-1
	-D LED_ON=HIGH
	; Using M5GFX driver
	-D HAS_SCREEN=1
	-D ROTATION=3

	-D USE_TFT_eSPI_TOUCH=1 #Dont use InputHandler_Task
	-D USE_M5GFX=1
	-D TFT_WIDTH=135
	-D TFT_HEIGHT=240
	-D TFT_MISO=22
	-D TFT_MOSI=21
	-D TFT_SCK=20
	-D TFT_CS=17
	-D TFT_RST=16

	-D SPI_SCK_PIN=6
	-D SPI_MOSI_PIN=5
	-D SPI_MISO_PIN=4
	-D SPI_SS_PIN=7

	;Default I2C port
	-D GROVE_SDA=5
	-D GROVE_SCL=4

	;Features Enabled
	;-DLITE_VERSION=1 ;limits some features to save space for M5Launcher Compatibility
	;-DMIC_SPM1423=1 ;Applicable for SPM1423 device
	;FM Radio
	-D FM_SI4713=1
	-D FM_RSTPIN=-1

	;Sound options
	-D BUZZ_PIN=11

	;Can run USB as HID
	;-D USB_as_HID=1 ;uncomment to enable
	-DBAD_TX=GROVE_SDA  ; Using Grove
	-DBAD_RX=GROVE_SCL	 ; Using Grove

	;-DALLOW_ALL_GPIO_FOR_IR_RF=1 ; Set this option to make use of all GPIOs, from 1 to 44 to be chosen, except TFT and SD pins
	;Infrared Led default pin and state
	-D IR_TX_PINS='{{"Default",9},{"M5 IR Mod", GROVE_SDA},{"G2",2},{"G6",6},{"G7",7},{"Grove 4",4},{"Grove 5",5}}'
	-D IR_RX_PINS='{{"M5 IR Mod", GROVE_SCL},{"G2",2},{"G6",6},{"G7",7},{"Grove 4",4},{"Grove 5",5}}'
	-D TXLED=9
	-D RXLED=GROVE_SDA
	-D LED_ON=HIGH
	-D LED_OFF=LOW

	;Radio Frequency (one pin modules) pin setting
	-D RF_TX_PINS='{{"M5 RF433T", GROVE_SDA},{"G2",2},{"G6",6},{"G7",7},{"Grove 4",4},{"Grove 5",5}}'
	-D RF_RX_PINS='{{"M5 RF433R", GROVE_SCL},{"G2",2},{"G6",6},{"G7",7},{"Grove 4",4},{"Grove 5",5}}'

	; -DUSE_CC1101_VIA_SPI # deprecated
	-DCC1101_GDO0_PIN=2
	-DCC1101_SS_PIN=SPI_SS_PIN
	-DCC1101_MOSI_PIN=SPI_MOSI_PIN
	-DCC1101_SCK_PIN=SPI_SCK_PIN
	-DCC1101_MISO_PIN=SPI_MISO_PIN

	; -DUSE_NRF24_VIA_SPI # deprecated
	-DNRF24_CE_PIN=2
	-DNRF24_SS_PIN=SPI_SS_PIN
	-DNRF24_MOSI_PIN=SPI_MOSI_PIN
	-DNRF24_SCK_PIN=SPI_SCK_PIN
	-DNRF24_MISO_PIN=SPI_MISO_PIN

	; -DUSE_W5500_VIA_SPI # deprecated
	-DW5500_SS_PIN=SPI_SS_PIN
	-DW5500_MOSI_PIN=SPI_MOSI_PIN
	-DW5500_SCK_PIN=SPI_SCK_PIN
	-DW5500_MISO_PIN=SPI_MISO_PIN
	-DW5500_INT_PIN=2

	;Lora setup pins
	-DLORA_SCK=TFT_SCK
	-DLORA_MISO=TFT_MISO
	-DLORA_MOSI=TFT_MOSI
	-DLORA_CS=23
	-DLORA_RST=-1
	-DLORA_DIO0=15

	;SD Card Setup pins
	-D SDCARD_CS=SPI_SS_PIN
	-D SDCARD_SCK=SPI_SCK_PIN
	-D SDCARD_MISO=SPI_MISO_PIN
	-D SDCARD_MOSI=SPI_MOSI_PIN

	; SERIAL (GPS) dedicated pins
	-D SERIAL_TX=GROVE_SDA
	-D SERIAL_RX=GROVE_SCL
	-D GPS_SERIAL_TX=GROVE_SDA
	-D GPS_SERIAL_RX=GROVE_SCL

lib_deps =
	${env.lib_deps}
	m5stack/M5Unified

lib_ignore =
	TFT_eSPI
